<!DOCTYPE html>
<html>
<body style="margin:0">

<iframe id="frame"
style="width:100%;height:100vh;border:none;"
sandbox="allow-scripts"></iframe>

<script>
async function carregar() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  let res = await fetch("https://servidor-130c0-default-rtdb.firebaseio.com/sites/" + id + ".json");
  let data = await res.json();

  if (data && data.html) {
    document.getElementById("frame").srcdoc = data.html;
  } else {
    document.body.innerHTML = "<h2 style='text-align:center'>Erro ao carregar 😢</h2>";
  }
}

carregar();
</script>

</body>
</html>
